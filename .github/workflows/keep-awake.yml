name: Keep Streamlit app awake

# Streamlit Community Cloud sleeps an app after inactivity. A plain HTTP ping
# cannot wake it, because a slept app serves a page with a "Yes, get this app
# back up!" button that must be CLICKED over a websocket. So we drive a real
# headless browser: load the page, and click the wake button if it appears.

on:
  schedule:
    # Every 5 minutes. (GitHub may delay scheduled runs under load, but this
    # keeps traffic flowing often enough to prevent sleep in practice.)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

# If a run is still going when the next one fires, skip the new one.
concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve app URL
        id: url
        run: |
          URL="${{ vars.STREAMLIT_APP_URL }}"
          if [ -z "$URL" ]; then
            URL="https://quilttracker.streamlit.app"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Pinging: $URL"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright==1.49.0
          python -m playwright install --with-deps chromium

      - name: Load app and click wake button if asleep
        env:
          APP_URL: ${{ steps.url.outputs.url }}
        run: |
          python - <<'PY'
          import os, sys
          from playwright.sync_api import sync_playwright

          url = os.environ["APP_URL"]

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)

              # If the app is asleep, Streamlit shows a wake button. Match it by
              # its text so we work regardless of element type.
              wake = page.get_by_text("get this app back up", exact=False)
              try:
                  if wake.count() > 0:
                      print("App was asleep — clicking wake button.")
                      wake.first.click()
                      # Give Streamlit time to spin the container back up.
                      page.wait_for_timeout(45000)
                  else:
                      print("App is awake.")
              except Exception as e:
                  print(f"Wake-button handling note: {e}")

              # Keep the websocket session alive briefly so it counts as traffic.
              page.wait_for_timeout(5000)
              browser.close()

          print("Done.")
          PY
